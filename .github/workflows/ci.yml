name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.1'
          cache: true
      - run: make check

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: runtime
          POSTGRES_PASSWORD: runtime
          POSTGRES_DB: runtime
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U runtime"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.1'
          cache: true
      - name: Enable pgvector
        run: |
          container_id=$(docker ps --filter ancestor=pgvector/pgvector:pg16 --format '{{.ID}}' | head -1)
          test -n "$container_id"
          docker exec "$container_id" psql -U runtime -d runtime -c 'CREATE EXTENSION IF NOT EXISTS vector'
      - run: make test-integration
        env:
          RUNTIME_PG_DSN: postgres://runtime:runtime@localhost:5432/runtime?sslmode=disable

  python-shim:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv run --project contrib/shims/python --isolated pytest contrib/shims/python/tests

  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      # helm-deps also unpacks the dependency: Helm 4 does not render a
      # dependency left only as charts/postgresql-*.tgz.
      - run: make helm-deps
      - run: bash deploy/charts/runtime/test.sh

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f deploy/Dockerfile -t runtime:ci .
      - run: docker compose -f deploy/docker-compose.full.yml config --quiet
      - run: docker compose -f deploy/compose/docker-compose.yml config --quiet
        env:
          RUNTIME_ADMIN_BOOTSTRAP: svk-ci.bootstrap
          RUNTIME_SECRETS_KEYS: ci:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          RUNTIME_SECRETS_PRIMARY: ci
