apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "runtime.fullname" . }}
  labels:
    {{- include "runtime.labels" . | nindent 4 }}
data:
  # runtime.requireAgents (called from the Deployment) guarantees a non-empty
  # agents list at render time, so there is no empty-config fallback here.
  runtime.yaml: |
    {{- toYaml .Values.config | nindent 4 }}
