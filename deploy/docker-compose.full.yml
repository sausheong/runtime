# Full stack: Postgres + control plane. Build context is the projects root
# (contains runtime/ and harness/). Run from the projects root:
#   docker compose -f runtime/deploy/docker-compose.full.yml up --build
#
# SECURITY: this baked-in runtime.yaml has no `tokens:`, so the control plane
# runs OPEN (unauthenticated). That's fine for a local demo. Before exposing it
# on a network, add a `tokens:` section to runtime.yaml (see README →
# Authentication) and terminate TLS upstream.
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: runtime
      POSTGRES_PASSWORD: runtime
      POSTGRES_DB: runtime
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U runtime"]
      interval: 2s
      timeout: 3s
      retries: 20
  runtimed:
    build:
      context: ../..
      dockerfile: runtime/deploy/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      RUNTIME_PG_DSN: postgres://runtime:runtime@postgres:5432/runtime?sslmode=disable
      RUNTIME_CTL_ADDR: ":8080"
    ports:
      - "8080:8080"
