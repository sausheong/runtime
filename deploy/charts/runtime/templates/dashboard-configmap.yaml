{{- if .Values.obs.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "runtime.fullname" . }}-dashboard
  labels:
    grafana_dashboard: "1"
    {{- include "runtime.labels" . | nindent 4 }}
data:
  runtime-overview.json: |
    {{- .Files.Get "files/runtime-overview.json" | nindent 4 }}
{{- end }}
