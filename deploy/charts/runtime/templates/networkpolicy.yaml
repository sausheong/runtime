{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "runtime.fullname" . }}
  labels:
    {{- include "runtime.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "runtime.selectorLabels" . | nindent 6 }}
      {{- if eq .Values.scheduling.mode "perAgentPods" }}
      # Governs the control-plane pod only; agent StatefulSet pods share the base
      # labels and would otherwise be swept in. A dedicated per-agent NetworkPolicy
      # is future work (see chart README).
      app.kubernetes.io/component: control-plane
      {{- end }}
  policyTypes: [Ingress, Egress]
  ingress:
    - ports:
        - port: 8080
          protocol: TCP
  egress:
    - {}
{{- end }}
