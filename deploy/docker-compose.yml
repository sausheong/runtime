services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: runtime
      POSTGRES_PASSWORD: runtime
      POSTGRES_DB: runtime
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U runtime"]
      interval: 2s
      timeout: 3s
      retries: 20
